{% extends "base.html" %}
{% block content %}
<header style="text-align: center; margin: 60px 0;">
    <h1 class="animate-in" style="font-size: 4.5rem; letter-spacing: -2px;">Keling, <span style="background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Kelajakni</span> sotib olamiz</h1>
    <form method="GET" style="max-width: 600px; margin: 40px auto;" class="animate-in">
        <div class="input-group">
            <input type="text" name="q" placeholder="Qidirayotgan narsangiz bormi?..." value="{{ query|default:'' }}">
        </div>
    </form>
</header>

<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 35px;">
    {% for product in products %}
    <a href="{% url 'product_about' product.id %}" style="text-decoration: none; color: inherit; display: block;">
        <div class="glass-card tilt-card animate-in" style="padding: 15px; height: 100%;">
            <div style="height: 260px; border-radius: 20px; overflow: hidden; position: relative;">
                <img src="{{ product.image.url }}" style="width: 100%; height: 100%; object-fit: cover;">
                <div style="position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 12px; font-weight: 800; color: var(--accent); border: 1px solid var(--glass-border); font-size: 1.1rem;">
                    ${{ product.price }}
                </div>
            </div>
            
            <div style="padding: 20px 5px;">
                <h3 style="margin-bottom: 10px; font-size: 1.4rem;">{{ product.name }}</h3>
                <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px;">
                    {{ product.description|truncatewords:10 }}
                </p>
                
                <div style="position: relative; z-index: 10;">
                    <button onclick="event.preventDefault(); window.location.href='{% url 'add_to_cart' product.id %}'" class="btn" style="width: 100%;">
                        🛒 Savatga qo'shish
                    </button>
                </div>
            </div>
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
