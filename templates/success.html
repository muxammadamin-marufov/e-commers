{% extends "base.html" %}
{% block content %}

<div class="flex justify-center items-center min-h-[75vh] px-4 py-8">
    <div class="bg-white dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-3xl p-10 sm:p-14 w-full max-w-xl shadow-2xl text-center relative overflow-hidden group">
        
        <div class="w-24 h-24 bg-green-50 dark:bg-emerald-500/10 text-green-500 dark:text-emerald-400 border-4 border-green-100 dark:border-emerald-500/30 rounded-full flex items-center justify-center text-5xl mx-auto mb-8 animate-bounce shadow-lg shadow-green-500/20">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <h1 class="text-3xl md:text-4xl font-black text-gray-900 dark:text-white tracking-tight mb-4">
            Muvaffaqiyatli <span class="text-green-500 dark:text-emerald-400">Yakunlandi!</span>
        </h1>
        
        <p class="text-gray-500 dark:text-gray-400 text-base max-w-md mx-auto leading-relaxed mb-10">
            Buyurtmangiz tizimga qabul qilindi. Operatorlarimiz mahsulotni jo'natish maqsadida tez orada siz bilan bog'lanishadi.
        </p>
        
        <hr class="border-gray-100 dark:border-white/10 mb-8">

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{% url 'index' %}" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-8 py-4 rounded-xl transition-all shadow-lg text-sm uppercase tracking-wider flex items-center justify-center gap-2">
                <i class="fa-solid fa-basket-shopping"></i> Yana xarid qilish
            </a>
        </div>
    </div>
</div>

{% endblock %}
