{% extends "base.html" %}
{% block content %}

<div class="flex justify-center items-center min-h-[75vh] py-8 px-4">
    <div class="bg-white dark:bg-white/5 border border-gray-100 dark:border-white/10 rounded-3xl p-8 md:p-10 w-full max-w-xl shadow-2xl relative overflow-hidden">
        
        <div class="text-center mb-10 relative z-10">
            <h2 class="text-3xl md:text-4xl font-extrabold tracking-tight text-gray-900 dark:text-white">
                Ma'lumotlarni <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-cyan-400">Tasdiqlang</span>
            </h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-3">Buyurtma aniq va tez yetib borishi uchun barcha maydonlarni to'ldiring</p>
        </div>

        <form method="POST" class="space-y-6 relative z-10">
            {% csrf_token %}
            
            <div>
                <label class="text-xs font-bold text-gray-600 dark:text-gray-400 block mb-2 uppercase tracking-wider">To'liq ism-sharifingiz (F.I.SH) *</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" name="full_name" placeholder="Masalan: Aliyev Vali..." required 
                           class="w-full bg-gray-50 dark:bg-darkbg border border-gray-200 dark:border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-600 dark:text-gray-400 block mb-2 uppercase tracking-wider">Telefon raqamingiz *</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                        <i class="fa-solid fa-phone"></i>
                    </span>
                    <input type="text" name="phone" placeholder="+998 (90) 123-4567" required 
                           class="w-full bg-gray-50 dark:bg-darkbg border border-gray-200 dark:border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-600 dark:text-gray-400 block mb-2 uppercase tracking-wider">Yetkazib berish manzili *</label>
                <div class="relative">
                    <span class="absolute top-4 left-4 text-gray-400">
                        <i class="fa-solid fa-map-location-dot"></i>
                    </span>
                    <textarea name="address" rows="3" placeholder="Viloyat, tuman, ko'cha va uy raqami..." required 
                              class="w-full bg-gray-50 dark:bg-darkbg border border-gray-200 dark:border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-indigo-500 transition-colors resize-none"></textarea>
                </div>
            </div>

            <div class="p-4 bg-indigo-50 dark:bg-indigo-500/10 border border-indigo-100 dark:border-indigo-500/20 rounded-xl flex items-center justify-between">
                <span class="text-sm font-semibold text-indigo-800 dark:text-indigo-300">To'lov usuli:</span>
                <span class="text-sm font-bold text-indigo-900 dark:text-white flex items-center gap-2">
                    <i class="fa-solid fa-truck text-indigo-500 dark:text-cyan-400"></i> Qabul qilinganda
                </span>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-indigo-500/30 text-sm tracking-wider uppercase mt-4 flex items-center justify-center gap-2">
                <span>Xaridni Yakunlash</span>
                <i class="fa-solid fa-circle-check"></i>
            </button>
        </form>
    </div>
</div>

{% endblock %}
