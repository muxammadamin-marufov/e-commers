{% extends "base.html" %}
{% block content %}

<div class="max-w-2xl mx-auto py-8 px-4">
    <div class="mb-6">
        <a href="{% url 'seller_dashboard' %}" class="text-sm font-semibold text-gray-500 dark:text-gray-400 hover:text-indigo-600 dark:hover:text-cyan-400 flex items-center gap-2 transition-colors">
            <i class="fa-solid fa-arrow-left-long"></i> Dashboardga qaytish
        </a>
    </div>

    <div class="bg-white dark:bg-white/5 border border-gray-100 dark:border-white/10 p-6 md:p-8 rounded-2xl shadow-2xl dark:shadow-none">
        <h3 class="text-2xl font-black text-gray-900 dark:text-white mb-6">
            Yangi <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-cyan-400">Mahsulot qo'shish</span>
        </h3>

        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Mahsulot nomi</label>
                <input type="text" name="name" placeholder="Masalan: iPhone 15 Pro Max" required class="w-full p-3 bg-gray-50 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-xl text-sm text-gray-900 dark:text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Narxi (so'm)</label>
                    <input type="number" name="price" placeholder="14000000" required class="w-full p-3 bg-gray-50 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-xl text-sm text-gray-900 dark:text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Omborda nechta bor (Stock)</label>
                    <input type="number" name="stock" placeholder="15" required class="w-full p-3 bg-gray-50 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-xl text-sm text-gray-900 dark:text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Mahsulot tavsifi</label>
                <textarea name="description" rows="4" placeholder="Mahsulot haqida batafsil ma'lumot kiriting..." class="w-full p-3 bg-gray-50 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-xl text-sm text-gray-900 dark:text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"></textarea>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Mahsulot rasmi (Ixtiyoriy)</label>
                <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 p-4 border border-dashed border-gray-200 dark:border-white/10 rounded-xl bg-gray-50/50 dark:bg-black/10">
                    <div class="w-full">
                        <input type="file" name="image" class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-700 dark:file:bg-indigo-500/20 dark:file:text-cyan-400 cursor-pointer">
                        <p class="text-xs text-gray-400 mt-1">Rasm yuklamasangiz, keyinchalik avtomatik to'ldirish funksiyasidan foydalanishingiz mumkin.</p>
                    </div>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-500/20 text-sm tracking-wide uppercase">
                    Omborga qo'shish
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
